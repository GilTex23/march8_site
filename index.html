<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Glassmorphism styles */
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        
        /* Wish text transition */
        .wish-text {
            transition: opacity 0.5s ease-in-out;
        }
        .wish-text.fade-out {
            opacity: 0;
        }
        .wish-text.fade-in {
            opacity: 1;
        }

        /* Blooming flower animation */
        @keyframes bloom {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.2) rotate(90deg); opacity: 0.8; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }
        .bloom-flower {
            position: absolute;
            pointer-events: none;
            animation: bloom 1.5s ease-out forwards;
            width: 50px;
            height: 50px;
            margin-left: -25px;
            margin-top: -25px;
            z-index: 50;
        }

        /* Canvas for petals */
        #petals-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Parallax background elements */
        .parallax-bg {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 20% 30%, rgba(254, 205, 211, 0.4) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(110, 231, 183, 0.3) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(251, 191, 36, 0.2) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body class="bg-pink-50 min-h-screen flex items-center justify-center overflow-hidden relative font-sans text-slate-800">

    <!-- Parallax Background -->
    <div class="parallax-bg" id="parallax-bg"></div>

    <!-- Petals Canvas -->
    <canvas id="petals-canvas"></canvas>

    <!-- Main Content -->
    <main class="relative z-20 p-6 w-full max-w-lg">
        <div class="glass-card rounded-3xl p-8 md:p-12 text-center flex flex-col items-center">
            <h1 class="text-4xl md:text-5xl font-bold text-rose-500 mb-4 drop-shadow-sm">С 8 Марта!</h1>
            <p class="text-lg text-slate-600 mb-8">Пусть этот весенний день принесет море улыбок, радости и тепла.</p>
            
            <div class="min-h-[100px] flex items-center justify-center mb-8 w-full bg-white/40 rounded-2xl p-6 border border-white/50 shadow-inner">
                <p id="wish-container" class="wish-text text-xl font-medium text-rose-600 italic text-center">
                    Нажми на кнопку, чтобы получить пожелание ✨
                </p>
            </div>

            <button id="wish-btn" class="bg-gradient-to-r from-rose-400 to-pink-500 hover:from-rose-500 hover:to-pink-600 text-white font-semibold py-3 px-8 rounded-full shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 focus:outline-none focus:ring-4 focus:ring-pink-300">
                Получить персональное пожелание
            </button>
        </div>
    </main>

    <script>
        // --- 1. Генератор пожеланий ---
        const wishes = [
            "Пусть каждый день будет наполнен счастьем и любовью!",
            "Желаю весеннего настроения и ярких эмоций!",
            "Пусть сбываются самые заветные мечты!",
            "Оставайся всегда такой же прекрасной и вдохновляющей!",
            "Пусть в душе всегда цветет весна!",
            "Желаю море цветов, улыбок и приятных сюрпризов!",
            "Пусть каждый миг приносит только радость!",
            "Желаю гармонии, уюта и бесконечного тепла!",
            "Пусть жизнь будет полна ярких красок и чудес!",
            "Желаю сиять ярче весеннего солнца!"
        ];

        const wishBtn = document.getElementById('wish-btn');
        const wishContainer = document.getElementById('wish-container');

        wishBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Предотвращаем срабатывание клика по экрану (цветение)
            
            // Плавное исчезновение
            wishContainer.classList.remove('fade-in');
            wishContainer.classList.add('fade-out');

            setTimeout(() => {
                // Выбор случайного пожелания
                const randomIndex = Math.floor(Math.random() * wishes.length);
                wishContainer.textContent = wishes[randomIndex];
                
                // Плавное появление
                wishContainer.classList.remove('fade-out');
                wishContainer.classList.add('fade-in');
            }, 500); // Время должно совпадать с CSS transition
        });

        // --- 2. "Цветение" при клике ---
        // SVG иконка цветка
        const flowerSVG = \`
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 10 C60 30 80 40 90 50 C80 60 60 70 50 90 C40 70 20 60 10 50 C20 40 40 30 50 10 Z" fill="#fbbf24" opacity="0.8"/>
                <circle cx="50" cy="50" r="15" fill="#f43f5e"/>
            </svg>
        \`;

        document.addEventListener('click', (e) => {
            const flower = document.createElement('div');
            flower.className = 'bloom-flower';
            flower.innerHTML = flowerSVG;
            flower.style.left = \`\${e.clientX}px\`;
            flower.style.top = \`\${e.clientY}px\`;
            
            document.body.appendChild(flower);

            // Удаляем элемент после завершения анимации
            setTimeout(() => {
                flower.remove();
            }, 1500);
        });

        // --- 3. Параллакс фона ---
        const parallaxBg = document.getElementById('parallax-bg');
        
        // Для десктопа (движение мыши)
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 50;
            const y = (window.innerHeight / 2 - e.clientY) / 50;
            parallaxBg.style.transform = \`translate(\${x}px, \${y}px)\`;
        });

        // Для мобильных (гироскоп)
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                const x = e.gamma ? e.gamma / 2 : 0; // Наклон влево/вправо
                const y = e.beta ? (e.beta - 45) / 2 : 0; // Наклон вперед/назад
                parallaxBg.style.transform = \`translate(\${x}px, \${y}px)\`;
            });
        }

        // --- 4. Падающие лепестки (Canvas) ---
        const canvas = document.getElementById('petals-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let petals = [];
        const numPetals = 40; // Количество лепестков

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Petal {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.size = Math.random() * 10 + 5;
                this.speedY = Math.random() * 1 + 0.5;
                this.speedX = Math.random() * 2 - 1;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
                // Нежные розовые оттенки
                const colors = ['#ffe4e6', '#fecdd3', '#fda4af'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y / 50) * 0.5; // Легкое покачивание
                this.rotation += this.rotationSpeed;

                // Если лепесток упал за нижний край, возвращаем наверх
                if (this.y > height + this.size) {
                    this.y = -this.size;
                    this.x = Math.random() * width;
                }
                // Если улетел за боковой край
                if (this.x > width + this.size) this.x = -this.size;
                if (this.x < -this.size) this.x = width + this.size;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                
                ctx.beginPath();
                // Рисуем форму лепестка
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(this.size / 2, -this.size / 2, this.size, 0, 0, this.size);
                ctx.bezierCurveTo(-this.size, 0, -this.size / 2, -this.size / 2, 0, 0);
                
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.7;
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Инициализация лепестков
        for (let i = 0; i < numPetals; i++) {
            petals.push(new Petal());
        }

        // Анимационный цикл
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });
            
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
