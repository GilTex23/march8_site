    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
            text-shadow: 0 0 20px rgba(244, 63, 94, 0.3);
        }

        .card-wrapper {
            position: relative;
            border-radius: 1.5rem;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0.1) 100%);
            background-size: 200% 200%;
            animation: borderBeam 4s linear infinite;
            transform-style: preserve-3d;
            will-change: transform;
        }

        @keyframes borderBeam {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: calc(1.5rem - 2px);
            box-shadow: 0 15px 50px 0 rgba(31, 38, 135, 0.15), inset 0 0 30px rgba(255,255,255,0.4);
            transform-style: preserve-3d;
            overflow: hidden;
            position: relative;
        }

        .wish-text {
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
        }
        .wish-text.fade-out {
            opacity: 0;
            transform: translateY(5px);
        }
        .wish-text.fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(40px, -60px) scale(1.1) rotate(10deg); }
            66% { transform: translate(-30px, 30px) scale(0.9) rotate(-5deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.6;
            animation: floatBlob 20s infinite ease-in-out alternate;
            z-index: 1;
            pointer-events: none;
        }

        #petals-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .parallax-bg {
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            z-index: 0;
            pointer-events: none;
            will-change: transform;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            transform: translate(-50%, -50%) scale(0);
            animation: rippleAnim 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rippleAnim {
            to {
                transform: translate(-50%, -50%) scale(4);
                opacity: 0;
            }
        }

        /* Возвращаем анимацию цветения */
        @keyframes bloom {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.2) rotate(90deg); opacity: 0.8; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

        .bloom-flower {
            position: fixed;
            pointer-events: none;
            animation: bloom 1.5s ease-out forwards;
            width: 50px;
            height: 50px;
            margin-left: -25px;
            margin-top: -25px;
            z-index: 50;
        }
    </style>
</head>

    <noscript><div><img src="https://mc.yandex.ru/watch/YM_COUNTER_ID" style="position:absolute; left:-9999px;" alt="" /></div></noscript>

    <div class="parallax-bg" id="parallax-bg"></div>

    <main class="relative z-20 p-6 w-full max-w-lg" style="perspective: 1200px;">
        <div class="card-wrapper" id="tilt-card">
            <div class="glass-card p-8 md:p-12 text-center flex flex-col items-center">
                <h1 class="font-playfair text-5xl md:text-6xl font-bold text-rose-500 mb-4 tracking-wide relative z-10" style="transform: translateZ(40px);">С 8 Марта!</h1>
                <p class="text-lg text-slate-700 mb-8 font-light relative z-10" style="transform: translateZ(30px);">Пусть этот весенний день принесет море улыбок, радости и тепла.</p>

                <div class="min-h-[140px] flex items-center justify-center mb-8 w-full bg-white/50 rounded-2xl p-6 border border-white/70 shadow-inner relative overflow-hidden z-10" style="transform: translateZ(20px);">
                    <p id="wish-container" class="wish-text text-xl font-medium text-rose-600 italic text-center leading-relaxed">
                        Нажми на кнопку, чтобы получить пожелание ✨

                <button id="wish-btn" class="relative overflow-hidden bg-gradient-to-r from-rose-400 via-pink-500 to-rose-400 hover:from-rose-500 hover:to-pink-600 text-white font-medium py-4 px-8 rounded-full shadow-lg hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 focus:outline-none bg-[length:200%_auto] hover:bg-right z-10" style="transform: translateZ(50px);">
                    Получить персональное пожелание

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSoftChime() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);

            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        const wishes = [
            "Пусть каждый день будет наполнен счастьем и искренней любовью!",
            "Желаю весеннего настроения и самых ярких эмоций!",
            "Пусть сбываются даже самые смелые и заветные мечты!",
            "Оставайся всегда такой же прекрасной, нежной и вдохновляющей!",
            "Пусть в твоей душе всегда цветет теплая весна!",
            "Желаю море цветов, улыбок и приятных сюрпризов каждый день!",
            "Пусть жизнь будет полна ярких красок, чудес и волшебства!",
            "Желаю гармонии, домашнего уюта и бесконечного тепла!",
            "Пусть каждый твой макет и дизайн-проект получается идеальным!",
            "Желаю сиять ярче весеннего солнца и согревать всех улыбкой!",
            "Пусть твое вдохновение всегда находит идеальное визуальное воплощение!",
            "Желаю легкости в учебе, работе и бесконечного очарования во всем!",
            "Пусть бэкенд всегда отвечает быстро, а фронтенд радует глаз!",
            "Желаю купаться в любви, искреннем внимании и нежности!",
            "Пусть весна подарит новые силы и грандиозные перспективы!",
            "Желаю идеального баланса между амбициозными целями и отдыхом!",
            "Пусть каждый день приносит отличные новости и повод для гордости!",
            "Желаю, чтобы твои таланты расцветали так же ярко, как весенние цветы!",
            "Пусть любые преграды растворяются, оставляя путь к успеху открытым!",
            "Желаю потрясающих путешествий и незабываемых впечатлений!",
            "Пусть рядом всегда будут люди, которые искренне ценят и поддерживают!",
            "Желаю создавать красоту вокруг себя одним лишь присутствием!",
            "Пусть каждая твоя идея становится настоящим шедевром!",
            "Желаю чувствовать себя счастливой каждую секунду этого дня!",
            "Пусть твоя энергия и обаяние открывают любые двери!",
            "Желаю бесконечного запаса сил для самых креативных начинаний!",
            "Пусть жизнь складывается так же гармонично, как идеальная палитра!",
            "Желаю, чтобы этот праздник оставил самые теплые воспоминания!"
        ];

        const wishBtn = document.getElementById('wish-btn');
        const wishContainer = document.getElementById('wish-container');
        const glassCard = document.querySelector('.glass-card');
        let lastWishIndex = -1;

        function createRipple(e) {
            const ripple = document.createElement('div');
            ripple.classList.add('ripple');

            const rect = glassCard.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            ripple.style.width = ripple.style.height = `${Math.max(rect.width, rect.height)}px`;

            glassCard.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1200);
        }

        wishBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            createRipple(e);

            wishContainer.classList.remove('fade-in');
            wishContainer.classList.add('fade-out');

            setTimeout(() => {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * wishes.length);
                } while (randomIndex === lastWishIndex);

                lastWishIndex = randomIndex;
                wishContainer.textContent = wishes[randomIndex];

                wishContainer.classList.remove('fade-out');
                wishContainer.classList.add('fade-in');
                playSoftChime();
            }, 600);
        });

        // Возвращаем логику появления цветка по клику на фон
        const flowerSVG = `
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 10 C60 30 80 40 90 50 C80 60 60 70 50 90 C40 70 20 60 10 50 C20 40 40 30 50 10 Z" fill="#fbbf24" opacity="0.8"/>
                <circle cx="50" cy="50" r="15" fill="#f43f5e"/>
            </svg>
        `;

        document.addEventListener('click', (e) => {
            const flower = document.createElement('div');
            flower.className = 'bloom-flower';
            flower.innerHTML = flowerSVG;
            flower.style.left = `${e.clientX}px`;
            flower.style.top = `${e.clientY}px`;

            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 1500);
        });

        const parallaxBg = document.getElementById('parallax-bg');
        const tiltCard = document.getElementById('tilt-card');

        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;
        let isHovering = false;

        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.clientX) / 40;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 40;

            parallaxBg.style.transform = `translate(${xAxis * 0.5}px, ${yAxis * 0.5}px)`;

            targetX = Math.max(-7, Math.min(7, xAxis));
            targetY = Math.max(-7, Math.min(7, yAxis));
            isHovering = true;
        });

        document.addEventListener('mouseleave', () => {
            targetX = 0;
            targetY = 0;
            isHovering = false;
        });

        function animateTilt() {
            currentX += (targetX - currentX) * 0.08;
            currentY += (targetY - currentY) * 0.08;

            if (Math.abs(targetX - currentX) > 0.01 || Math.abs(targetY - currentY) > 0.01 || isHovering) {
                tiltCard.style.transform = `rotateY(${-currentX}deg) rotateX(${currentY}deg)`;
            }

            requestAnimationFrame(animateTilt);
        }
        animateTilt();

        const canvas = document.getElementById('petals-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let petals = [];
        const numPetals = 60;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Petal {
            constructor() {
                this.reset(true);
            }

            reset(initial = false) {
                this.x = Math.random() * width;
                this.y = initial ? Math.random() * height : -20;

                const layerRand = Math.random();
                if (layerRand > 0.8) {
                    this.layer = 'front';
                    this.size = Math.random() * 15 + 10;
                    this.speedY = Math.random() * 2 + 1.5;
                    this.alpha = 0.9;
                } else if (layerRand > 0.4) {
                    this.layer = 'middle';
                    this.size = Math.random() * 10 + 6;
                    this.speedY = Math.random() * 1.5 + 0.8;
                    this.alpha = 0.6;
                } else {
                    this.layer = 'back';
                    this.size = Math.random() * 6 + 3;
                    this.speedY = Math.random() * 0.8 + 0.3;
                    this.alpha = 0.3;
                }

                this.speedX = Math.random() * 2 - 1;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;

                const colors = ['#ffe4e6', '#fecdd3', '#fda4af', '#fff1f2'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y / 80) * (this.layer === 'front' ? 1.5 : 0.5);
                this.rotation += this.rotationSpeed;

                if (this.y > height + this.size) this.reset();
                if (this.x > width + this.size) this.x = -this.size;
                if (this.x < -this.size) this.x = width + this.size;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(this.size / 2, -this.size / 2, this.size, 0, 0, this.size);
                ctx.bezierCurveTo(-this.size, 0, -this.size / 2, -this.size / 2, 0, 0);

                ctx.fillStyle = this.color;

                if (this.layer === 'front') {
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = this.color;
                }

                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < numPetals; i++) {
            petals.push(new Petal());
        }

        function animatePetals() {
            ctx.clearRect(0, 0, width, height);

            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            requestAnimationFrame(animatePetals);
        }

        animatePetals();
    </script>
</body>
