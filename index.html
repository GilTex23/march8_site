<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        .card-wrapper {
            position: relative;
            border-radius: 1.5rem;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.1) 100%);
            background-size: 200% 200%;
            animation: borderBeam 4s linear infinite;
            perspective: 1000px;
        }

        @keyframes borderBeam {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: calc(1.5rem - 2px);
            box-shadow: 0 10px 40px 0 rgba(31, 38, 135, 0.15), inset 0 0 20px rgba(255,255,255,0.3);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .wish-text {
            transition: opacity 0.5s ease-in-out;
        }
        .wish-text.fade-out {
            opacity: 0;
        }
        .wish-text.fade-in {
            opacity: 1;
        }

        @keyframes bloom {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.2) rotate(45deg); opacity: 0.9; }
            100% { transform: scale(1.5) rotate(90deg); opacity: 0; }
        }
        .bloom-flower {
            position: absolute;
            pointer-events: none;
            animation: bloom 1.5s ease-out forwards;
            width: 60px;
            height: 60px;
            margin-left: -30px;
            margin-top: -30px;
            z-index: 50;
        }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.7;
            animation: floatBlob 15s infinite ease-in-out;
            z-index: 1;
            pointer-events: none;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 100;
        }

        #petals-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .parallax-bg {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 20% 30%, rgba(254, 205, 211, 0.3) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(110, 231, 183, 0.2) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(251, 191, 36, 0.15) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 to-rose-100 min-h-screen flex items-center justify-center overflow-hidden relative font-sans text-slate-800">

    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=YM_COUNTER_ID', 'ym');

        ym(YM_COUNTER_ID, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <noscript><div><img src="https://mc.yandex.ru/watch/YM_COUNTER_ID" style="position:absolute; left:-9999px;" alt="" /></div></noscript>

    <div class="parallax-bg" id="parallax-bg"></div>

    <div class="bg-blob bg-rose-300 w-[500px] h-[500px] top-[-15%] left-[-10%]"></div>
    <div class="bg-blob bg-fuchsia-300 w-[400px] h-[400px] bottom-[-10%] right-[-5%]" style="animation-delay: -5s;"></div>
    <div class="bg-blob bg-amber-200 w-[300px] h-[300px] top-[40%] left-[50%]" style="animation-delay: -10s;"></div>

    <canvas id="petals-canvas"></canvas>

    <main class="relative z-20 p-6 w-full max-w-lg perspective-1000">
        <div class="card-wrapper">
            <div class="glass-card p-8 md:p-12 text-center flex flex-col items-center" id="tilt-card">
                <h1 class="font-playfair text-5xl md:text-6xl font-bold text-rose-500 mb-4 drop-shadow-md tracking-wide" style="transform: translateZ(30px);">С 8 Марта!</h1>
                <p class="text-lg text-slate-600 mb-8 font-light" style="transform: translateZ(20px);">Пусть этот весенний день принесет море улыбок, радости и тепла.</p>

                <div class="min-h-[140px] flex items-center justify-center mb-8 w-full bg-white/40 rounded-2xl p-6 border border-white/60 shadow-inner relative overflow-hidden" style="transform: translateZ(25px);">
                    <p id="wish-container" class="wish-text text-xl font-medium text-rose-600 italic text-center leading-relaxed">
                        Нажми на кнопку, чтобы получить пожелание ✨
                    </p>
                </div>

                <button id="wish-btn" class="relative overflow-hidden bg-gradient-to-r from-rose-400 via-pink-500 to-rose-400 hover:from-rose-500 hover:to-pink-600 text-white font-semibold py-4 px-8 rounded-full shadow-lg hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 focus:outline-none bg-[length:200%_auto] hover:bg-right" style="transform: translateZ(35px);">
                    Получить персональное пожелание
                </button>

                <p class="mt-8 text-sm text-pink-500 font-medium opacity-80" style="transform: translateZ(15px);">С любовью и заботой ✨</p>
            </div>
        </div>
    </main>

    <script>
        const wishes = [
            "Пусть каждый день будет наполнен счастьем и искренней любовью!",
            "Желаю весеннего настроения и самых ярких эмоций!",
            "Пусть сбываются даже самые смелые и заветные мечты!",
            "Оставайся всегда такой же прекрасной, нежной и вдохновляющей!",
            "Пусть в твоей душе всегда цветет теплая весна!",
            "Желаю море цветов, улыбок и приятных сюрпризов каждый день!",
            "Пусть жизнь будет полна ярких красок, чудес и волшебства!",
            "Желаю гармонии, домашнего уюта и бесконечного тепла!",
            "Пусть каждый твой макет и дизайн-проект получается pixel-perfect!",
            "Желаю сиять ярче весеннего солнца и согревать всех улыбкой!",
            "Пусть твое вдохновение всегда находит идеальное визуальное воплощение!",
            "Желаю легкости в учебе, работе и бесконечного очарования во всем!",
            "Пусть бэкенд всегда отвечает быстро, а фронтенд радует глаз!",
            "Желаю купаться в любви, искреннем внимании и нежности!",
            "Пусть весна подарит новые силы и грандиозные перспективы!",
            "Желаю идеального баланса между амбициозными целями и отдыхом!",
            "Пусть каждый день приносит отличные новости и повод для гордости!",
            "Желаю, чтобы твои таланты расцветали так же ярко, как весенние цветы!",
            "Пусть любые преграды растворяются, оставляя путь к успеху открытым!",
            "Желаю потрясающих путешествий и незабываемых впечатлений!",
            "Пусть рядом всегда будут люди, которые искренне ценят и поддерживают!",
            "Желаю создавать красоту вокруг себя одним лишь присутствием!",
            "Пусть каждая твоя идея становится шедевром!",
            "Желаю чувствовать себя счастливой каждую секунду этого дня!",
            "Пусть твоя энергия и обаяние открывают любые двери!",
            "Желаю бесконечного запаса сил для самых креативных начинаний!",
            "Пусть жизнь складывается так же гармонично, как идеальная палитра цветов!",
            "Желаю, чтобы этот праздник оставил самые теплые воспоминания!"
        ];

        const wishBtn = document.getElementById('wish-btn');
        const wishContainer = document.getElementById('wish-container');
        let lastWishIndex = -1;

        function createConfetti(x, y) {
            const colors = ['#f43f5e', '#ec4899', '#fbbf24', '#34d399', '#a78bfa'];
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;

                const isCircle = Math.random() > 0.5;
                particle.style.borderRadius = isCircle ? '50%' : '2px';

                const angle = Math.random() * Math.PI * 2;
                const velocity = 60 + Math.random() * 80;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity - 80;
                const rotation = Math.random() * 360;

                particle.animate([
                    { transform: `translate(0, 0) scale(1) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0) rotate(${rotation}deg)`, opacity: 0 }
                ], {
                    duration: 800 + Math.random() * 500,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                });

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1300);
            }
        }

        wishBtn.addEventListener('click', (e) => {
            e.stopPropagation();

            const rect = wishBtn.getBoundingClientRect();
            createConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);

            wishContainer.classList.remove('fade-in');
            wishContainer.classList.add('fade-out');

            setTimeout(() => {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * wishes.length);
                } while (randomIndex === lastWishIndex);

                lastWishIndex = randomIndex;
                wishContainer.textContent = wishes[randomIndex];

                wishContainer.classList.remove('fade-out');
                wishContainer.classList.add('fade-in');
            }, 500);
        });

        const flowerSVGs = [
            `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 10 C60 30 80 40 90 50 C80 60 60 70 50 90 C40 70 20 60 10 50 C20 40 40 30 50 10 Z" fill="#f43f5e" opacity="0.85"/><circle cx="50" cy="50" r="15" fill="#fcd34d"/></svg>`,
            `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 90 Q45 50 20 30 Q50 10 80 30 Q55 50 50 90" fill="#ec4899" opacity="0.9"/><path d="M50 90 Q40 60 30 50 Q50 30 70 50 Q60 60 50 90" fill="#be185d" opacity="0.7"/></svg>`,
            `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 50 L30 10 A20 20 0 0 0 10 30 Z M50 50 L90 30 A20 20 0 0 0 70 10 Z M50 50 L70 90 A20 20 0 0 0 90 70 Z M50 50 L10 70 A20 20 0 0 0 30 90 Z" fill="#f472b6" opacity="0.8"/><circle cx="50" cy="50" r="12" fill="#fef08a"/></svg>`,
            `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="25" r="20" fill="#fda4af" opacity="0.9"/><circle cx="75" cy="50" r="20" fill="#fda4af" opacity="0.9"/><circle cx="50" cy="75" r="20" fill="#fda4af" opacity="0.9"/><circle cx="25" cy="50" r="20" fill="#fda4af" opacity="0.9"/><circle cx="50" cy="50" r="15" fill="#fde047"/></svg>`
        ];

        document.addEventListener('click', (e) => {
            const flower = document.createElement('div');
            flower.className = 'bloom-flower';
            flower.innerHTML = flowerSVGs[Math.floor(Math.random() * flowerSVGs.length)];
            flower.style.left = `${e.clientX}px`;
            flower.style.top = `${e.clientY}px`;

            const randomRotation = Math.floor(Math.random() * 360);
            flower.style.transform = `rotate(${randomRotation}deg)`;

            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 1500);
        });

        const parallaxBg = document.getElementById('parallax-bg');
        const tiltCard = document.getElementById('tilt-card');

        document.addEventListener('mousemove', (e) => {
            const px = (window.innerWidth / 2 - e.clientX) / 60;
            const py = (window.innerHeight / 2 - e.clientY) / 60;
            parallaxBg.style.transform = `translate(${px}px, ${py}px)`;

            const cx = (window.innerWidth / 2 - e.clientX) / 40;
            const cy = (window.innerHeight / 2 - e.clientY) / 40;
            tiltCard.style.transform = `rotateY(${-cx}deg) rotateX(${cy}deg)`;
        });

        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                const px = e.gamma ? e.gamma / 2 : 0;
                const py = e.beta ? (e.beta - 45) / 2 : 0;
                parallaxBg.style.transform = `translate(${px}px, ${py}px)`;
                tiltCard.style.transform = `rotateY(${px/2}deg) rotateX(${py/2}deg)`;
            });
        }

        const canvas = document.getElementById('petals-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let petals = [];
        const numPetals = 45;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Petal {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.size = Math.random() * 12 + 6;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 2 - 1;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
                const colors = ['#ffe4e6', '#fecdd3', '#fda4af', '#fff1f2'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y / 60) * 0.8;
                this.rotation += this.rotationSpeed;

                if (this.y > height + this.size) {
                    this.y = -this.size;
                    this.x = Math.random() * width;
                }
                if (this.x > width + this.size) this.x = -this.size;
                if (this.x < -this.size) this.x = width + this.size;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(this.size / 2, -this.size / 2, this.size, 0, 0, this.size);
                ctx.bezierCurveTo(-this.size, 0, -this.size / 2, -this.size / 2, 0, 0);

                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.8;
                ctx.fill();

                ctx.restore();
            }
        }

        for (let i = 0; i < numPetals; i++) {
            petals.push(new Petal());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
