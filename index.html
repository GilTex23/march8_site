<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1), inset 0 0 20px rgba(255,255,255,0.2);
            animation: cardPulse 4s infinite alternate ease-in-out;
        }

        @keyframes cardPulse {
            0% { box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1), inset 0 0 20px rgba(255,255,255,0.2); }
            100% { box-shadow: 0 8px 32px 0 rgba(244, 63, 94, 0.2), inset 0 0 30px rgba(255,255,255,0.5); }
        }

        .wish-text {
            transition: opacity 0.5s ease-in-out;
        }
        .wish-text.fade-out {
            opacity: 0;
        }
        .wish-text.fade-in {
            opacity: 1;
        }

        @keyframes bloom {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.2) rotate(45deg); opacity: 0.9; }
            100% { transform: scale(1.5) rotate(90deg); opacity: 0; }
        }
        .bloom-flower {
            position: absolute;
            pointer-events: none;
            animation: bloom 1.5s ease-out forwards;
            width: 60px;
            height: 60px;
            margin-left: -30px;
            margin-top: -30px;
            z-index: 50;
        }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: floatBlob 15s infinite ease-in-out;
            z-index: 1;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
        }

        #petals-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .parallax-bg {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 20% 30%, rgba(254, 205, 211, 0.2) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(110, 231, 183, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(251, 191, 36, 0.1) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 to-rose-100 min-h-screen flex items-center justify-center overflow-hidden relative font-sans text-slate-800">

    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=YM_COUNTER_ID', 'ym');

        ym(YM_COUNTER_ID, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <noscript><div><img src="https://mc.yandex.ru/watch/YM_COUNTER_ID" style="position:absolute; left:-9999px;" alt="" /></div></noscript>

    <div class="parallax-bg" id="parallax-bg"></div>

    <div class="bg-blob bg-rose-300 w-96 h-96 top-[-10%] left-[-10%]"></div>
    <div class="bg-blob bg-pink-300 w-80 h-80 bottom-[-10%] right-[-10%]" style="animation-delay: -5s;"></div>
    <div class="bg-blob bg-amber-200 w-64 h-64 top-[40%] left-[60%]" style="animation-delay: -10s;"></div>

    <canvas id="petals-canvas"></canvas>

    <main class="relative z-20 p-6 w-full max-w-lg">
        <div class="glass-card rounded-3xl p-8 md:p-12 text-center flex flex-col items-center">
            <h1 class="font-playfair text-5xl md:text-6xl font-bold text-rose-500 mb-4 drop-shadow-md">С 8 Марта!</h1>
            <p class="text-lg text-slate-600 mb-8 font-light">Пусть этот весенний день принесет море улыбок, радости и тепла.</p>

            <div class="min-h-[120px] flex items-center justify-center mb-8 w-full bg-white/50 rounded-2xl p-6 border border-white/60 shadow-inner relative overflow-hidden">
                <p id="wish-container" class="wish-text text-xl font-medium text-rose-600 italic text-center leading-relaxed">
                    Нажми на кнопку, чтобы получить пожелание ✨
                </p>
            </div>

            <button id="wish-btn" class="relative overflow-hidden bg-gradient-to-r from-rose-400 via-pink-500 to-rose-400 hover:from-rose-500 hover:to-pink-600 text-white font-semibold py-4 px-8 rounded-full shadow-lg hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0 focus:outline-none bg-[length:200%_auto] hover:bg-right">
                Получить персональное пожелание
            </button>

            <p class="mt-8 text-sm text-pink-400 font-medium opacity-80">С любовью и заботой ✨</p>
        </div>
    </main>

    <script>
        const wishes = [
            "Пусть каждый день будет наполнен счастьем и любовью!",
            "Желаю весеннего настроения и самых ярких эмоций!",
            "Пусть сбываются даже самые невероятные мечты!",
            "Оставайся всегда такой же прекрасной, нежной и вдохновляющей!",
            "Пусть в твоей душе всегда круглый год цветет весна!",
            "Желаю море цветов, искренних улыбок и приятных сюрпризов!",
            "Пусть каждый миг приносит только радость и удовольствие!",
            "Желаю гармонии, домашнего уюта и бесконечного тепла!",
            "Пусть жизнь будет полна ярких красок, чудес и волшебства!",
            "Желаю сиять ярче весеннего солнца каждый день!",
            "Пусть твои креативные идеи всегда находят идеальное воплощение!",
            "Желаю вдохновения для создания самых красивых и удобных интерфейсов в жизни!",
            "Пусть каждый твой день складывается как идеальный, гармоничный макет!",
            "Желаю, чтобы окружающий мир радовал так же, как идеально подобранная палитра!",
            "Пусть удача сопутствует в каждом начинании и проекте!",
            "Желаю легкости, красоты и бесконечного очарования во всем!",
            "Пусть каждое утро начинается с улыбки и хороших новостей!",
            "Желаю купаться в любви, искреннем внимании и нежности!",
            "Пусть весна подарит новые силы и грандиозные перспективы!",
            "Желаю, чтобы каждый день приносил повод для гордости собой!"
        ];

        const wishBtn = document.getElementById('wish-btn');
        const wishContainer = document.getElementById('wish-container');
        let lastWishIndex = -1;

        function createConfetti(x, y) {
            const colors = ['#f43f5e', '#ec4899', '#fbbf24', '#34d399'];
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;

                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity - 50;

                particle.animate([
                    { transform: `translate(0, 0) scale(1)`, opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600 + Math.random() * 400,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                });

                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        wishBtn.addEventListener('click', (e) => {
            e.stopPropagation();

            const rect = wishBtn.getBoundingClientRect();
            createConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);

            wishContainer.classList.remove('fade-in');
            wishContainer.classList.add('fade-out');

            setTimeout(() => {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * wishes.length);
                } while (randomIndex === lastWishIndex);

                lastWishIndex = randomIndex;
                wishContainer.textContent = wishes[randomIndex];

                wishContainer.classList.remove('fade-out');
                wishContainer.classList.add('fade-in');
            }, 500);
        });

        const flowerSVGs = [
            `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 10 C60 30 80 40 90 50 C80 60 60 70 50 90 C40 70 20 60 10 50 C20 40 40 30 50 10 Z" fill="#fbbf24" opacity="0.8"/><circle cx="50" cy="50" r="15" fill="#f43f5e"/></svg>`,
            `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 90 Q45 50 20 30 Q50 10 80 30 Q55 50 50 90" fill="#ec4899" opacity="0.9"/><path d="M50 90 Q40 60 30 50 Q50 30 70 50 Q60 60 50 90" fill="#be185d" opacity="0.7"/></svg>`,
            `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 50 L30 10 A20 20 0 0 0 10 30 Z M50 50 L90 30 A20 20 0 0 0 70 10 Z M50 50 L70 90 A20 20 0 0 0 90 70 Z M50 50 L10 70 A20 20 0 0 0 30 90 Z" fill="#f472b6" opacity="0.8"/><circle cx="50" cy="50" r="12" fill="#fef08a"/></svg>`
        ];

        document.addEventListener('click', (e) => {
            const flower = document.createElement('div');
            flower.className = 'bloom-flower';
            flower.innerHTML = flowerSVGs[Math.floor(Math.random() * flowerSVGs.length)];
            flower.style.left = `${e.clientX}px`;
            flower.style.top = `${e.clientY}px`;

            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 1500);
        });

        const parallaxBg = document.getElementById('parallax-bg');

        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 50;
            const y = (window.innerHeight / 2 - e.clientY) / 50;
            parallaxBg.style.transform = `translate(${x}px, ${y}px)`;
        });

        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                const x = e.gamma ? e.gamma / 2 : 0;
                const y = e.beta ? (e.beta - 45) / 2 : 0;
                parallaxBg.style.transform = `translate(${x}px, ${y}px)`;
            });
        }

        const canvas = document.getElementById('petals-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let petals = [];
        const numPetals = 45;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Petal {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.size = Math.random() * 12 + 6;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 2 - 1;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
                const colors = ['#ffe4e6', '#fecdd3', '#fda4af', '#fff1f2'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y / 60) * 0.8;
                this.rotation += this.rotationSpeed;

                if (this.y > height + this.size) {
                    this.y = -this.size;
                    this.x = Math.random() * width;
                }
                if (this.x > width + this.size) this.x = -this.size;
                if (this.x < -this.size) this.x = width + this.size;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(this.size / 2, -this.size / 2, this.size, 0, 0, this.size);
                ctx.bezierCurveTo(-this.size, 0, -this.size / 2, -this.size / 2, 0, 0);

                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.8;
                ctx.fill();

                ctx.restore();
            }
        }

        for (let i = 0; i < numPetals; i++) {
            petals.push(new Petal());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
